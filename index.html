<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Invibe Staff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1E6BF1" />
    <title>Invibe Staff</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180.png" />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(160deg, #1E6BF1 0%, #1450C8 100%);
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.45s ease;
      }
      #splash img {
        width: 116px; height: 116px; object-fit: contain;
        filter: brightness(0) invert(1);
        animation: splashPulse 1.4s ease-in-out infinite;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.07); opacity: 0.65; }
      }
    </style>
  </head>
  <body>
    <div id="splash"><img src="/Logotipo.png" alt="Invibe" /></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
